<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <link rel="icon" href="https://by-pro.kesug.com/App.png?v=3" type="image/png">
    <title>B.Y PRO App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #ffffff; --surface: #f8f9fa; --text: #111; --text-muted: #4a4a4a; --border: #e5e5e5; --primary: #0066cc; --primary-dark: #0052a3; --danger: #ef4444; --success: #10b981; }
        .dark-theme { --bg: #000000; --surface: #1a1a1a; --text: #fff; --text-muted: #b0b0b0; --border: #333; --primary: #3b82f6; --primary-dark: #2563eb; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: all 0.2s; font-size: 14px; }
        .menu-trigger { position: fixed; left: 0; top: 50%; transform: translateY(-50%); width: 44px; height: 70px; background: rgba(255,255,255,0.96); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: 1px solid rgba(0,0,0,0.12); border-left: none; border-radius: 0 20px 20px 0; font-size: 1.3rem; color: var(--primary); }
        .dark-theme .menu-trigger { background: rgba(30,30,40,0.85); }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.25s; overflow-y: auto; }
        .sidebar.mobile-open { transform: translateX(0); }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .sidebar-logo img { width: 36px; height: 36px; }
        .sidebar-title { font-weight: 700; background: linear-gradient(135deg, var(--primary), #6c5ce7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sidebar-nav { padding: 12px; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 8px 12px; margin-bottom: 4px; border-radius: 12px; color: var(--text-muted); cursor: pointer; font-weight: 500; font-size: 0.85rem; }
        .nav-item i { width: 24px; }
        .nav-item:hover, .nav-item.active { background: rgba(0,102,204,0.08); color: var(--primary); }
        .theme-switch-sidebar { margin: 12px; padding: 10px; background: var(--bg); border-radius: 12px; display: flex; justify-content: space-between; border: 1px solid var(--border); }
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; border-radius: 22px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(22px); }
        .main-content { padding: 12px 16px; }
        .section-page { display: none; }
        .section-page.active-page { display: block; }
        .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .greeting-section { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .avatar-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), #6c5ce7); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        .wallet-badge, .bell-icon { background: var(--surface); border: 1px solid var(--border); border-radius: 40px; padding: 4px 10px; display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: 600; cursor: pointer; }
        .carousel-container { position: relative; width: 100%; border-radius: 14px; overflow: hidden; margin-bottom: 20px; aspect-ratio: 16/9; max-height: 300px; background: var(--surface); }
        .carousel-slides { position: relative; width: 100%; height: 100%; }
        .carousel-slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s; }
        .carousel-slide.active { opacity: 1; }
        .carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
        .carousel-indicators { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 6px; z-index: 2; }
        .indicator { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.6); cursor: pointer; }
        .indicator.active { background: var(--primary); width: 16px; border-radius: 4px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-title { font-size: 1rem; font-weight: 700; }
        .section-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 30px; font-size: 0.6rem; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 20px; }
        /* البطاقات المربعة - صورة + اسم فقط */
        .group-wrapper { margin-bottom: 28px; border: 2px solid var(--primary); border-radius: 24px; background: rgba(59,130,246,0.02); overflow: hidden; }
        .group-cards-container { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px; }
        .square-card-item { width: 160px; background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; transition: all 0.2s; text-decoration: none; display: block; color: inherit; }
        .square-card-item:hover { transform: translateY(-4px); border-color: var(--primary); }
        .square-card-img { width: 100%; height: 120px; object-fit: cover; background: var(--bg); }
        .square-card-content { padding: 10px; text-align: center; }
        .square-card-name { font-weight: 600; font-size: 0.85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @media (max-width: 640px) { .square-card-item { width: calc(50% - 8px); min-width: 130px; } }
        /* البطاقات العادية */
        .slim-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
        .card-media { height: 160px; overflow: hidden; }
        .card-media img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 12px; }
        .card-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .card-desc { color: var(--text-muted); font-size: 0.75rem; }
        .toast-notification { position: fixed; bottom: 5%; left: 50%; transform: translateX(-50%); background: var(--surface); border-radius: 40px; padding: 8px 16px; display: none; align-items: center; gap: 8px; z-index: 2000; border-left: 3px solid var(--success); }
        .toast-notification.show { display: flex; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card { background: var(--surface); border-radius: 24px; padding: 20px; width: 85%; max-width: 300px; text-align: center; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
        .close-modal { margin-top: 12px; background: var(--primary); color: white; border: none; padding: 8px; border-radius: 40px; width: 100%; cursor: pointer; }
        @media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } .carousel-container { aspect-ratio: 4/3; max-height: 200px; } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="menu-trigger" id="menuTrigger"><i class="fas fa-chevron-right"></i><div class="menu-dot" id="menuDot"></div></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo"><img src="https://by-pro.kesug.com/App.png?v=3"></div><span class="sidebar-title">B.Y PRO App</span></div>
        <nav class="sidebar-nav">
            <div class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
            <div class="nav-item" data-page="digital"><i class="fas fa-code"></i><span>خدمات رقمية</span></div>
            <div class="nav-item" data-page="local"><i class="fas fa-print"></i><span>خدمات محلية</span></div>
            <div class="nav-item" data-page="phone"><i class="fas fa-mobile-alt"></i><span>خدمات الهاتف</span></div>
            <div class="nav-item" data-page="products"><i class="fas fa-cubes"></i><span>منتجات</span></div>
            <div class="nav-item" data-page="wallet"><i class="fas fa-wallet"></i><span>المحفظة</span></div>
            <div class="nav-item" data-page="social"><i class="fas fa-share-alt"></i><span>وسائل التواصل</span></div>
            <div class="nav-item" data-page="support"><i class="fas fa-headset"></i><span>الدعم</span></div>
        </nav>
        <div class="theme-switch-sidebar"><span><i class="fas fa-moon"></i> الوضع الليلي</span><label class="toggle-switch"><input type="checkbox" id="themeToggleSidebar"><span class="slider"></span></label></div>
    </aside>
    <main class="main-content">
        <div id="homePage" class="section-page active-page">
            <div class="home-header">
                <div class="greeting-section" id="greetingAvatar"><div class="avatar-icon" id="avatarIcon"><i class="fas fa-user"></i></div><div class="greeting-text">مرحباً، <span id="userName" class="user-name">زائر</span></div></div>
                <div class="wallet-badge" id="homeWalletBadge"><i class="fas fa-wallet"></i> <span id="homeWalletAmount"><span class="spinner"></span></span></div>
            </div>
            <div class="carousel-container" id="carouselContainer"><div class="carousel-slides" id="carouselSlides"></div><div class="carousel-indicators" id="carouselIndicators"></div></div>
            <!-- البطاقات المربعة -->
            <div id="squareGroupsSection" style="margin-bottom: 20px;"></div>
            <div class="section-header"><h2 class="section-title">آخر الأخبار</h2><span class="section-badge">جديد</span></div>
            <div id="newsContainer" class="cards-grid"></div>
        </div>
        <div id="digitalPage" class="section-page"><div class="section-header"><h1 class="section-title">الخدمات الرقمية</h1></div><div id="digitalContainer" class="cards-grid"></div></div>
        <div id="localPage" class="section-page"><div class="section-header"><h1 class="section-title">الخدمات المحلية</h1></div><div id="localContainer" class="cards-grid"></div></div>
        <div id="phonePage" class="section-page"><div class="section-header"><h1 class="section-title">خدمات الهاتف</h1></div><div id="phoneContainer" class="cards-grid"></div></div>
        <div id="productsPage" class="section-page"><div class="section-header"><h1 class="section-title">المنتجات</h1></div><div id="productsContainer" class="cards-grid"></div></div>
        <div id="walletPage" class="section-page"><div class="section-header"><h1 class="section-title">المحفظة</h1></div><div id="walletInfo">جاري التحميل...</div></div>
        <div id="socialPage" class="section-page"><div class="section-header"><h1 class="section-title">وسائل التواصل</h1></div><div id="socialContainer" class="cards-grid"></div></div>
        <div id="supportPage" class="section-page"><div class="section-header"><h1 class="section-title">الدعم الفني</h1></div><form id="supportForm"><input type="text" id="supportName" placeholder="الاسم" required><input type="text" id="supportSubject" placeholder="الموضوع" required><textarea id="supportMessage" placeholder="الرسالة" rows="3"></textarea><button type="submit">إرسال</button></form><div id="supportResult"></div></div>
    </main>
</div>
<div class="modal-overlay" id="accountModal"><div class="modal-card"><h3>بيانات الحساب</h3><div class="info-row"><span>الاسم:</span><span id="modalUserName"></span></div><div class="info-row"><span>البريد:</span><span id="modalUserEmail"></span></div><button class="close-modal" id="closeModalBtn">إغلاق</button><button class="close-modal" id="logoutBtn" style="background:#ef4444;">تسجيل خروج</button></div></div>
<div class="toast-notification" id="toast"><div class="toast-icon">✓</div><div class="toast-message"></div></div>
<script src="https://yacine2007.github.io/secure-auth-app/bypro-auth.js"></script>
<script>
    const API_BASE = 'https://b-y-pro-app.onrender.com';
    let currentUser = null, auth = null;
    let contentData = { images: [], news: [], digital: [], local: [], phone: [], products: [], social: [] };
    let squareGroups = [];

    function showToast(msg, isErr) {
        const toast = document.getElementById('toast'), tMsg = document.querySelector('.toast-message');
        tMsg.textContent = msg;
        toast.style.borderLeftColor = isErr ? '#ef4444' : '#10b981';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    async function fetchData() {
        try {
            const res = await fetch(`${API_BASE}/api/data`);
            if(!res.ok) throw new Error();
            const data = await res.json();
            contentData = {
                images: data.images || [],
                news: data.news || [],
                digital: data.digital || [],
                local: data.local || [],
                phone: data.phone || [],
                products: data.products || [],
                social: data.social || []
            };
            squareGroups = data.squareGroups || [];
            renderAll();
        } catch(e) { console.error('فشل جلب البيانات', e); }
    }

    function renderCarousel(images) {
        const slides = document.getElementById('carouselSlides'), inds = document.getElementById('carouselIndicators');
        if(!slides || !inds) return;
        if(!images.length) { slides.innerHTML = '<div class="carousel-slide active"><img src="https://placehold.co/800x400/1a1a1a/3b82f6?text=B.Y+PRO"></div>'; inds.innerHTML = ''; return; }
        slides.innerHTML = images.map((img,idx) => `<div class="carousel-slide ${idx===0?'active':''}"><img src="${img.imageUrl}" alt="${img.alt}"></div>`).join('');
        inds.innerHTML = images.map((_,idx) => `<div class="indicator ${idx===0?'active':''}" data-index="${idx}"></div>`).join('');
        document.querySelectorAll('.indicator').forEach(ind => ind.addEventListener('click', () => { const i = parseInt(ind.dataset.index); if(!isNaN(i)) goToSlide(i); }));
        startAutoSlide();
    }
    let currentSlide=0, slideInterval;
    function goToSlide(i) { const slides=document.querySelectorAll('.carousel-slide'), inds=document.querySelectorAll('.indicator'); if(!slides.length) return; slides[currentSlide].classList.remove('active'); if(inds[currentSlide]) inds[currentSlide].classList.remove('active'); currentSlide=(i+slides.length)%slides.length; slides[currentSlide].classList.add('active'); if(inds[currentSlide]) inds[currentSlide].classList.add('active'); }
    function nextSlide() { goToSlide(currentSlide+1); }
    function startAutoSlide() { if(slideInterval) clearInterval(slideInterval); slideInterval = setInterval(nextSlide, 5000); }

    function renderSquareGroups(groups) {
        const container = document.getElementById('squareGroupsSection');
        if(!container) return;
        if(!groups || groups.length===0) { container.innerHTML = ''; return; }
        let html = '';
        for(const group of groups) {
            if(!group.cards || group.cards.length===0) continue;
            const activeCards = group.cards.filter(c => c.active !== false);
            if(activeCards.length===0) continue;
            html += `<div class="group-wrapper"><div class="group-cards-container">`;
            for(const card of activeCards) {
                html += `<a href="${escapeHtml(card.link || '#')}" target="_blank" class="square-card-item">
                            <img class="square-card-img" src="${escapeHtml(card.imageUrl || 'https://placehold.co/400x200/1a1a1a/3b82f6?text=Card')}" alt="${escapeHtml(card.name)}" onerror="this.src='https://placehold.co/400x200/1a1a1a/3b82f6?text=Image'">
                            <div class="square-card-content">
                                <div class="square-card-name">${escapeHtml(card.name)}</div>
                            </div>
                        </a>`;
            }
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function renderNews(news) {
        const c = document.getElementById('newsContainer');
        if(!c) return;
        const active = news.filter(n => n.enabled !== false);
        if(!active.length) { c.innerHTML = '<div class="slim-card"><div class="card-content">لا توجد أخبار</div></div>'; return; }
        c.innerHTML = active.map(n => `<div class="slim-card"><div class="card-content"><div class="card-title"><i class="${n.icon||'fas fa-newspaper'}" style="color:${n.color||'#3b82f6'}"></i> ${escapeHtml(n.title)}</div><div class="card-desc">${escapeHtml(n.description)}</div></div></div>`).join('');
    }

    function renderServices(containerId, items, icon) {
        const c = document.getElementById(containerId);
        if(!c) return;
        const active = items.filter(i => i.enabled !== false);
        if(!active.length) { c.innerHTML = '<div class="slim-card"><div class="card-content">لا توجد خدمات</div></div>'; return; }
        c.innerHTML = active.map(i => `<div class="slim-card">${i.imageUrl ? `<div class="card-media"><img src="${i.imageUrl}" alt="${escapeHtml(i.name)}"></div>` : ''}<div class="card-content"><div class="card-title"><i class="${icon}"></i> ${escapeHtml(i.name)}</div><div class="card-desc">${escapeHtml(i.description)}</div></div></div>`).join('');
    }

    function renderSocial(social) {
        const c = document.getElementById('socialContainer');
        if(!c) return;
        if(!social.length) { c.innerHTML = '<div class="slim-card"><div class="card-content">لا توجد روابط</div></div>'; return; }
        c.innerHTML = social.map(s => `<a href="${escapeHtml(s.url)}" target="_blank" class="slim-card social-card" style="text-align:center; display:block; text-decoration:none;"><div class="card-content"><i class="${escapeHtml(s.icon)}" style="font-size:1.6rem; color:${s.color}"></i><div class="card-title">${escapeHtml(s.name)}</div></div></a>`).join('');
    }

    function renderAll() {
        renderCarousel(contentData.images);
        renderSquareGroups(squareGroups);
        renderNews(contentData.news);
        renderServices('digitalContainer', contentData.digital, 'fas fa-code');
        renderServices('localContainer', contentData.local, 'fas fa-print');
        renderServices('phoneContainer', contentData.phone, 'fas fa-mobile-alt');
        renderServices('productsContainer', contentData.products, 'fas fa-cubes');
        renderSocial(contentData.social);
    }

    function escapeHtml(s) { return s ? s.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) : ''; }

    // محاكاة بسيطة للمحفظة (للتجربة)
    function updateUIForUser(user) {
        currentUser = user;
        document.getElementById('userName').textContent = user.name || user.username || 'زائر';
        document.getElementById('modalUserName').textContent = user.name || user.username;
        document.getElementById('modalUserEmail').textContent = user.email || 'غير متوفر';
        document.getElementById('homeWalletAmount').innerHTML = '$0.00';
    }

    auth = new BYPROAuth({
        loginUrl: 'https://yacine2007.github.io/secure-auth-app/login.html',
        onLogin: (user) => { updateUIForUser(user); fetchData(); },
        onLogout: () => { auth.show(); }
    });
    setTimeout(() => { if(auth.isAuthenticated()) updateUIForUser(auth.getCurrentUser()); else auth.show(); fetchData(); }, 500);

    // التنقل
    const pages = { home: 'homePage', digital: 'digitalPage', local: 'localPage', phone: 'phonePage', products: 'productsPage', wallet: 'walletPage', social: 'socialPage', support: 'supportPage' };
    function navigateTo(p) { Object.keys(pages).forEach(k => document.getElementById(pages[k]).classList.remove('active-page')); document.getElementById(pages[p]).classList.add('active-page'); document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); document.querySelector(`.nav-item[data-page="${p}"]`).classList.add('active'); document.getElementById('sidebar').classList.remove('mobile-open'); }
    document.querySelectorAll('.nav-item').forEach(n => { if(n.dataset.page) n.addEventListener('click',()=>navigateTo(n.dataset.page)); });
    document.getElementById('menuTrigger').addEventListener('click',()=>document.getElementById('sidebar').classList.toggle('mobile-open'));
    document.getElementById('greetingAvatar').addEventListener('click',()=>document.getElementById('accountModal').classList.add('active'));
    document.getElementById('closeModalBtn').addEventListener('click',()=>document.getElementById('accountModal').classList.remove('active'));
    document.getElementById('logoutBtn').addEventListener('click',()=>{ if(auth) auth.logout(); });
    const themeToggle = document.getElementById('themeToggleSidebar');
    if(localStorage.getItem('darkTheme')==='true') { document.documentElement.classList.add('dark-theme'); themeToggle.checked=true; }
    themeToggle.addEventListener('change', e => { if(e.target.checked) document.documentElement.classList.add('dark-theme'); else document.documentElement.classList.remove('dark-theme'); localStorage.setItem('darkTheme', e.target.checked); });
    fetchData();
</script>
</body>
</html>
